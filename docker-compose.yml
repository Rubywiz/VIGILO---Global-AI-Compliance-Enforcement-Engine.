version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vigilo-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - vigilo_uploads:/tmp/vigilo_uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vigilo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    restart: unless-stopped

volumes:
  vigilo_uploads:
